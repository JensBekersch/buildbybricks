services:
  agentic-rag:
    build:
      context: .
    ports:
      - "8000:8000"
    environment:
      AGENTIC_RAG_HOST: "0.0.0.0"
      AGENTIC_RAG_PORT: "8000"
      AGENTIC_RAG_FRONTEND_DIR: "frontend"
      AGENTIC_RAG_DATA_DIR: "data"
      AGENTIC_RAG_TEMPLATE_DIR: "template"
      AGENTIC_RAG_EMBEDDING_PROVIDER: "hash"
      AGENTIC_RAG_EMBEDDING_MODEL: "local-hash-v1"
      AGENTIC_RAG_EMBEDDING_DIMENSION: "64"
      AGENTIC_RAG_EMBEDDING_API_BASE_URL: "http://host.docker.internal:11434"
    volumes:
      - ./data:/app/data:ro
      - ./template:/app/template:ro
