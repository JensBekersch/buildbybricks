services:
  agentic-rag:
    build:
      context: .
    ports:
      - "8000:8000"
    environment:
      AGENTIC_RAG_HOST: "0.0.0.0"
      AGENTIC_RAG_PORT: "8000"
      AGENTIC_RAG_FRONTEND_DIR: "${AGENTIC_RAG_FRONTEND_DIR:-frontend}"
      AGENTIC_RAG_DATA_DIR: "${AGENTIC_RAG_DATA_DIR:-data}"
      AGENTIC_RAG_TEMPLATE_DIR: "${AGENTIC_RAG_TEMPLATE_DIR:-template}"
      AGENTIC_RAG_APPS_DIR: "${AGENTIC_RAG_APPS_DIR:-apps}"
      AGENTIC_RAG_EMBEDDING_PROVIDER: "${AGENTIC_RAG_EMBEDDING_PROVIDER:-hash}"
      AGENTIC_RAG_EMBEDDING_MODEL: "${AGENTIC_RAG_EMBEDDING_MODEL:-local-hash-v1}"
      AGENTIC_RAG_EMBEDDING_DIMENSION: "${AGENTIC_RAG_EMBEDDING_DIMENSION:-64}"
      AGENTIC_RAG_EMBEDDING_API_BASE_URL: "${AGENTIC_RAG_EMBEDDING_API_BASE_URL:-http://ollama:11434}"
      AGENTIC_RAG_EMBEDDING_API_KEY: "${AGENTIC_RAG_EMBEDDING_API_KEY:-}"
      AGENTIC_RAG_LLM_PROVIDER: "${AGENTIC_RAG_LLM_PROVIDER:-deterministic}"
      AGENTIC_RAG_LLM_MODEL: "${AGENTIC_RAG_LLM_MODEL:-local-deterministic-v1}"
      AGENTIC_RAG_LLM_API_BASE_URL: "${AGENTIC_RAG_LLM_API_BASE_URL:-http://ollama:11434}"
      AGENTIC_RAG_LLM_API_KEY: "${AGENTIC_RAG_LLM_API_KEY:-}"
      AGENTIC_RAG_LLM_TIMEOUT_SECONDS: "${AGENTIC_RAG_LLM_TIMEOUT_SECONDS:-1200}"
      AGENTIC_RAG_LLM_MAX_TOKENS: "${AGENTIC_RAG_LLM_MAX_TOKENS:-4096}"
      AGENTIC_RAG_ARCHITECTURE_GENERATION_MODE: "${AGENTIC_RAG_ARCHITECTURE_GENERATION_MODE:-agentic_with_review}"
      AGENTIC_RAG_DATABASE_URL: "${AGENTIC_RAG_DATABASE_URL:-postgresql://agentic_rag:agentic_rag@postgres:5432/agentic_rag}"
      AGENTIC_RAG_WORKER_POLL_SECONDS: "${AGENTIC_RAG_WORKER_POLL_SECONDS:-2}"
      AGENTIC_RAG_JOB_STREAM_POLL_SECONDS: "${AGENTIC_RAG_JOB_STREAM_POLL_SECONDS:-1}"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - ./template:/app/template:ro
      - ./apps:/app/apps:ro
    networks:
      - default
      - platform_proxy

  worker:
    build:
      context: .
    command: ["python", "-m", "agentic_rag_template.software_factory.worker"]
    environment:
      AGENTIC_RAG_FRONTEND_DIR: "${AGENTIC_RAG_FRONTEND_DIR:-frontend}"
      AGENTIC_RAG_DATA_DIR: "${AGENTIC_RAG_DATA_DIR:-data}"
      AGENTIC_RAG_TEMPLATE_DIR: "${AGENTIC_RAG_TEMPLATE_DIR:-template}"
      AGENTIC_RAG_APPS_DIR: "${AGENTIC_RAG_APPS_DIR:-apps}"
      AGENTIC_RAG_EMBEDDING_PROVIDER: "${AGENTIC_RAG_EMBEDDING_PROVIDER:-hash}"
      AGENTIC_RAG_EMBEDDING_MODEL: "${AGENTIC_RAG_EMBEDDING_MODEL:-local-hash-v1}"
      AGENTIC_RAG_EMBEDDING_DIMENSION: "${AGENTIC_RAG_EMBEDDING_DIMENSION:-64}"
      AGENTIC_RAG_EMBEDDING_API_BASE_URL: "${AGENTIC_RAG_EMBEDDING_API_BASE_URL:-http://ollama:11434}"
      AGENTIC_RAG_EMBEDDING_API_KEY: "${AGENTIC_RAG_EMBEDDING_API_KEY:-}"
      AGENTIC_RAG_LLM_PROVIDER: "${AGENTIC_RAG_LLM_PROVIDER:-deterministic}"
      AGENTIC_RAG_LLM_MODEL: "${AGENTIC_RAG_LLM_MODEL:-local-deterministic-v1}"
      AGENTIC_RAG_LLM_API_BASE_URL: "${AGENTIC_RAG_LLM_API_BASE_URL:-http://ollama:11434}"
      AGENTIC_RAG_LLM_API_KEY: "${AGENTIC_RAG_LLM_API_KEY:-}"
      AGENTIC_RAG_LLM_TIMEOUT_SECONDS: "${AGENTIC_RAG_LLM_TIMEOUT_SECONDS:-1200}"
      AGENTIC_RAG_LLM_MAX_TOKENS: "${AGENTIC_RAG_LLM_MAX_TOKENS:-4096}"
      AGENTIC_RAG_ARCHITECTURE_GENERATION_MODE: "${AGENTIC_RAG_ARCHITECTURE_GENERATION_MODE:-agentic_with_review}"
      AGENTIC_RAG_DATABASE_URL: "${AGENTIC_RAG_DATABASE_URL:-postgresql://agentic_rag:agentic_rag@postgres:5432/agentic_rag}"
      AGENTIC_RAG_WORKER_POLL_SECONDS: "${AGENTIC_RAG_WORKER_POLL_SECONDS:-2}"
      AGENTIC_RAG_JOB_STREAM_POLL_SECONDS: "${AGENTIC_RAG_JOB_STREAM_POLL_SECONDS:-1}"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - ./template:/app/template:ro
      - ./apps:/app/apps:ro

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-agentic_rag}"
      POSTGRES_USER: "${POSTGRES_USER:-agentic_rag}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-agentic_rag}"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres:/var/lib/postgresql/data

  ollama:
    image: ollama/ollama:latest
    profiles:
      - ollama
    environment:
      OLLAMA_NUM_THREADS: "${OLLAMA_NUM_THREADS:-12}"
      OLLAMA_NUM_PARALLEL: "${OLLAMA_NUM_PARALLEL:-1}"
      OLLAMA_MAX_LOADED_MODELS: "${OLLAMA_MAX_LOADED_MODELS:-1}"
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama

  prometheus:
    image: prom/prometheus:latest
    depends_on:
      - agentic-rag
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus:/prometheus

  grafana:
    image: grafana/grafana:latest
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: "${GRAFANA_ADMIN_USER:-admin}"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD:-admin}"
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3000:3000"
    volumes:
      - grafana:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - default
      - platform_proxy

networks:
  platform_proxy:
    external: true
    name: "${PLATFORM_PROXY_NETWORK:-platform_proxy}"

volumes:
  ollama:
  postgres:
  prometheus:
  grafana:
