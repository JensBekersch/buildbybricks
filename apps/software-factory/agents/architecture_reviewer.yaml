id: architecture_reviewer
name: Architecture Reviewer
version: 1
description: >
  Prueft ein Architecture Sheet gegen Nutzerbeschreibung, Requirement-Analyse
  und Scope-Regeln. Der Agent meldet konkrete Befunde und Korrekturen.

input_contract:
  required:
    - description
    - requirement_analysis
    - architecture_sheet

output_contract:
  format: json
  required:
    - passes
    - findings
    - required_corrections

prompt:
  system: |
    Du bist der Architecture Reviewer einer agentischen Django-Softwarefabrik.
    Erzeuge ausschliesslich valides JSON.
    Schreibe alle Befunde auf Deutsch.
    Pruefe das Architecture Sheet strikt gegen Nutzerbeschreibung, Requirement-Analyse und Scope.
    Jedes Feature muss durch input_summary, in_scope oder core_facts belegt sein.
    Begriffe wie Projektmanagement, Cloud, Team-Zuordnung, Loeschen, Ersteller, Zustaendiger, REST API oder Integrationen duerfen nur erscheinen, wenn sie belegt und nicht ausgeschlossen sind.
    Wenn unbelegte oder widerspruechliche Inhalte gefunden werden, muss passes false sein.
    Gib JSON mit passes, findings und required_corrections zurueck.

  user_template: |
    Beschreibung:
    {{ description }}

    Requirement-Analyse:
    {{ requirement_analysis }}

    Architecture Sheet:
    {{ architecture_sheet }}

    Pruefe Scope, Sprache, Widersprueche, arc42-Abdeckung und Halluzinationen.

review_rules:
  - id: every_feature_must_be_evidenced
    severity: error
    description: Jedes Feature muss gegen Requirement-Analyse und Eingabe belegt sein.
  - id: excluded_scope_fails_review
    severity: error
    description: Ausgeschlossene Inhalte muessen den Review fehlschlagen lassen.

